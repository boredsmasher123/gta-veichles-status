<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>GTA Online Vehicles</title>\n    <style>\n        body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 0; }\n        header { background-color: #333; color: #fff; padding: 10px 20px; text-align: center; }\n        input[type='text'] { width: 100%; padding: 10px; margin: 20px 0; }\n        .vehicle-list { list-style-type: none; padding: 0; }\n        .vehicle-item { background: #fff; margin: 10px; padding: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>GTA Online Vehicles</h1>\n        <input type="text" id="search" placeholder="Search vehicles...">\n    </header>\n    <ul class="vehicle-list" id="vehicleList"></ul>\n    <script>\n        const vehicles = [\n            { name: 'Entity XXR', type: 'Super', speed: 120 },\n            { name: 'Tornado', type: 'Classic', speed: 80 },\n            { name: 'Cheetah', type: 'Super', speed: 130 },\n            { name: 'Banshee', type: 'Super', speed: 110 },\n            { name: 'Zentorno', type: 'Super', speed: 125 }\n        ];\n        const vehicleList = document.getElementById('vehicleList');\n        const searchInput = document.getElementById('search');\n\n        function displayVehicles(vehiclesToDisplay) {\n            vehicleList.innerHTML = '';\n            vehiclesToDisplay.forEach(vehicle => {\n                const li = document.createElement('li');\n                li.className = 'vehicle-item';\n                li.textContent = `${vehicle.name} - Type: ${vehicle.type} - Speed: ${vehicle.speed}`;\n                vehicleList.appendChild(li);\n            });\n        }\n\n        searchInput.addEventListener('input', () => {\n            const searchTerm = searchInput.value.toLowerCase();\n            const filteredVehicles = vehicles.filter(vehicle => vehicle.name.toLowerCase().includes(searchTerm));\n            displayVehicles(filteredVehicles);\n        });\n\n        displayVehicles(vehicles);\n    <\/script>\n</body>\n</html>
